name: validate

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
      - name: Check skill metadata
        run: |
          python - <<'PY'
          from pathlib import Path
          skill = Path("skills/ppt-template-deck-builder")
          text = (skill / "SKILL.md").read_text(encoding="utf-8")
          assert text.startswith("---\n"), "missing frontmatter"
          front = text.split("---\n", 2)[1]
          fields = {}
          for line in front.splitlines():
              if ":" in line:
                  key, value = line.split(":", 1)
                  fields[key.strip()] = value.strip()
          assert fields.get("name") == "ppt-template-deck-builder"
          assert fields.get("description")
          print("skill metadata ok")
          PY
      - name: Compile Python scripts
        run: |
          python -m py_compile skills/ppt-template-deck-builder/scripts/*.py
